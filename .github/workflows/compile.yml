name: Compile Src

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Set up Node
        uses: actions/setup-node@v6.4.0

      - name: Install dependencies
        run: |
          npm install

      - name: Compile
        run: |
          npm run build

      - name: Upload Executable
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dist-latest
          path: dist/
